<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FarmaPRO | Catálogo de Ofertas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo">
                <span class="logo-light">FARMA</span><span class="logo-bold">PRO</span>
            </div>
            <a href="https://wa.me/5521987911068" class="btn-whatsapp-top" target="_blank">
                FALE CONOSCO
            </a>
        </div>
        
        <h1 class="promo-title"> Catálogo De Ofertas</h1>
        <p class="promo-subtitle">Seu catálogo digital de saúde e bem-estar. Peça agora e receba em casa com agilidade.</p>
    </header>

    <div class="search-area">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="O que você está procurando?" onkeyup="filterProducts()">
        </div>
    </div>

    <main id="shop">
        </main>

    <footer>
        <div class="logo" style="color: #003b95; margin-bottom: 15px;">
            <span class="logo-light">FARMA</span><span class="logo-bold">PRO</span>
        </div>
        <p style="color: #718096; font-size: 14px;">📍 Atendimento em toda a região</p>
        <p style="color: #718096; font-size: 12px; margin-top: 10px;">© 2024 Farmácia FarmaPRO. Imagens ilustrativas.</p>
    </footer>

    <div class="cart-button" onclick="openCart()">
        <span class="cart-counter" id="cart-count">0</span>
        🛒
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2 style="color: var(--primary); font-weight: 800;">Meu Pedido</h2>
                <button onclick="closeCart()" style="border:none; background:none; font-size:32px; cursor:pointer; color:#999;">&times;</button>
            </div>

            <div id="cart-items">
                </div>

            <div class="total-section">
                <span>Total:</span>
                <span id="total-price">R$ 0,00</span>
            </div>

            <div class="form-group">
                <input type="text" id="nome" placeholder="Seu Nome Completo">
                <input type="text" id="endereco" placeholder="Endereço de Entrega (Rua, Número, Bairro)">
                
                <label style="font-size: 12px; color: #718096; margin-left: 5px;">Forma de Pagamento:</label>
                <select id="pagamento" onchange="toggleTroco()">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão (Levamos a maquininha)</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>

                <div id="troco-container">
                    <input type="text" id="valor-troco" placeholder="Troco para quanto?">
                </div>
            </div>

            <button class="btn-checkout" onclick="sendWhatsApp()">
                FINALIZAR PEDIDO NO WHATSAPP
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
