<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FarmaPRO | Premium Health</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="header-top">
                <div class="logo">
                    <span class="logo-bold">FARMA</span><span class="logo-light">PRO</span>
                </div>
                <a href="https://wa.me/5521987911068?text=Olá! Vim do site e gostaria de tirar algumas dúvidas." class="btn-whatsapp-top" target="_blank">
                    Atendimento Online
                </a>
            </div>
            <div class="promo-banner">
                <h1 class="promo-title">OFERTAS EXCLUSIVAS</h1>
                <p class="promo-subtitle">Produtos selecionados com preços de fábrica direto no seu WhatsApp</p>
            </div>
        </div>
    </header>

    <section class="search-area">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Pesquisar por nome do produto..." onkeyup="filterProducts()">
        </div>
    </section>

    <main id="shop">
        </main>

    <footer>
        <div class="footer-content">
            <div class="footer-brand">FARMAPRO</div>
            <p>Sua saúde é nossa prioridade.</p>
            <div class="footer-details">
                <span>📍 Av. Principal, 1000 - Centro</span>
                <span>📞 (11) 99999-9999</span>
            </div>
        </div>
    </footer>

    <div class="cart-button" onclick="openCart()">
        <span class="cart-counter" id="cart-count">0</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Meu Pedido</h2>
                <button class="close-modal" onclick="closeCart()">&times;</button>
            </div>
            
            <div id="cart-items">
                </div>

            <div class="total-section">
                <span>Valor Total</span>
                <span id="total-price">R$ 0,00</span>
            </div>

            <form id="checkout-form">
                <div class="form-group">
                    <input type="text" id="nome" placeholder="Seu Nome completo" required>
                    <input type="text" id="endereco" placeholder="Endereço de entrega" required>
                    <select id="pagamento" required onchange="toggleTroco()">
                        <option value="" disabled selected>Forma de pagamento</option>
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão na entrega</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                    <input type="text" id="troco" placeholder="Troco para quanto?" style="display:none;">
                </div>
                <button type="button" class="btn-checkout" onclick="sendWhatsApp()">FINALIZAR COMPRA</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
